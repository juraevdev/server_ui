{% extends "panel/base.html" %}

{% block title %}Create container · Docker Panel{% endblock %}
{% block heading %}Create container{% endblock %}

{% block content %}
<div class="card" style="max-width: 520px;">
  <form method="post">
    {% csrf_token %}

    <label>
      Image
      <span class="hint">e.g. nginx:latest</span>
      <input type="text" name="image" value="{{ form_data.image }}" placeholder="nginx:latest" required>
    </label>

    <label>
      Container name
      <input type="text" name="name" value="{{ form_data.name }}" placeholder="my-nginx" required>
    </label>

    <label>
      Port mapping
      <span class="hint">optional, host:container — e.g. 8081:80</span>
      <input type="text" name="port_mapping" value="{{ form_data.port_mapping }}" placeholder="8081:80">
    </label>

    <div class="btn-group">
      <button class="btn btn-primary" type="submit">Create</button>
      <a class="btn" href="{% url 'panel:dashboard' %}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
