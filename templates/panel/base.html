<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Docker Panel{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #d9e2ec;
      --primary: #2563eb;
      --danger: #dc2626;
      --success-bg: #ecfdf5;
      --success-text: #047857;
      --error-bg: #fef2f2;
      --error-text: #b91c1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .messages {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
    }

    .messages li {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .messages .success {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .messages .error {
      background: var(--error-bg);
      color: var(--error-text);
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .btn-danger {
      color: var(--danger);
      border-color: #fecaca;
    }

  .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 600;
    }

    code {
      background: #eef2f7;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .status {
      text-transform: capitalize;
      font-weight: 600;
    }

    .empty {
      color: var(--muted);
      padding: 12px 0;
    }

    label {
      display: block;
      margin-bottom: 12px;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      margin-top: 6px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font: inherit;
    }

    .section-title {
      margin: 28px 0 12px;
      font-size: 1.1rem;
    }

    .section-title:first-of-type {
      margin-top: 0;
    }

    .radio-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 500;
      margin-bottom: 0;
    }

    .hint {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 400;
    }

    pre.logs {
      margin: 0;
      padding: 16px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.85rem;
      line-height: 1.45;
      max-height: 70vh;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>{% block heading %}Docker Panel{% endblock %}</h1>
      <div>
        {% block header_actions %}
        <a class="btn" href="{% url 'panel:dashboard' %}">Dashboard</a>
        <a class="btn" href="{% url 'panel:create_image' %}">Create image</a>
        <a class="btn btn-primary" href="{% url 'panel:create' %}">Create container</a>
        {% endblock %}
      </div>
    </header>

    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li class="{{ message.tags }}">{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
